<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de FAQ - CRM Inmobiliario</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .main-content {
            padding: 40px;
        }
        
        .section {
            margin-bottom: 40px;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 5px solid #4facfe;
        }
        
        .section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8em;
        }
        
        .search-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .input-group {
            flex: 1;
            min-width: 250px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: #4facfe;
        }
        
        .btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e6cf 100%);
        }
        
        .result-container {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e1e5e9;
        }
        
        .result-item {
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #4facfe;
        }
        
        .result-item h4 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .result-item p {
            color: #666;
            line-height: 1.6;
        }
        
        .whatsapp-preview {
            background: #25d366;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 15px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        
        .whatsapp-preview h4 {
            margin-bottom: 10px;
            color: white;
        }
        
        .whatsapp-message {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
            white-space: pre-line;
            line-height: 1.5;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #4facfe;
            margin-bottom: 10px;
        }
        
        .stat-label {
            color: #666;
            font-weight: 600;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4facfe;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        @media (max-width: 768px) {
            .search-container {
                flex-direction: column;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .main-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 Sistema de FAQ</h1>
            <p>CRM Inmobiliario - Gestión Inteligente de Preguntas Frecuentes</p>
        </div>
        
        <div class="main-content">
            <!-- Sección de Búsqueda -->
            <div class="section">
                <h2>🔍 Búsqueda de FAQ</h2>
                <div class="search-container">
                    <div class="input-group">
                        <label for="searchQuery">Consulta del Cliente:</label>
                        <textarea id="searchQuery" rows="3" placeholder="Ejemplo: ¿Cuál es el precio de las casas?"></textarea>
                    </div>
                    <div class="input-group">
                        <label for="leadName">Nombre del Lead (opcional):</label>
                        <input type="text" id="leadName" placeholder="Juan Pérez">
                    </div>
                </div>
                <button class="btn" onclick="searchFAQ()">Buscar Respuesta</button>
                <button class="btn btn-secondary" onclick="generateWhatsAppResponse()">Generar Respuesta WhatsApp</button>
                
                <div class="loading" id="searchLoading">
                    <div class="spinner"></div>
                    <p>Buscando respuesta...</p>
                </div>
                
                <div id="searchResults"></div>
            </div>
            
            <!-- Sección de Gestión -->
            <div class="section">
                <h2>⚙️ Gestión del Sistema</h2>
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <button class="btn btn-success" onclick="loadFAQsFromCSV()">Cargar FAQs desde CSV</button>
                    <button class="btn btn-secondary" onclick="loadAllFAQs()">Ver Todas las FAQs</button>
                </div>
                
                <div class="loading" id="managementLoading">
                    <div class="spinner"></div>
                    <p>Procesando...</p>
                </div>
                
                <div id="managementResults"></div>
                
                <!-- Estadísticas -->
                <div class="stats" id="statsContainer" style="display: none;">
                    <div class="stat-card">
                        <div class="stat-number" id="totalFAQs">0</div>
                        <div class="stat-label">Total FAQs</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="lastUpdate">-</div>
                        <div class="stat-label">Última Actualización</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Función para buscar FAQ
        async function searchFAQ() {
            const query = document.getElementById('searchQuery').value.trim();
            if (!query) {
                alert('Por favor, ingresa una consulta');
                return;
            }
            
            showLoading('searchLoading');
            
            try {
                const response = await fetch('/api/faq/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query: query })
                });
                
                const data = await response.json();
                displaySearchResults(data);
            } catch (error) {
                displayError('Error al buscar FAQ: ' + error.message);
            } finally {
                hideLoading('searchLoading');
            }
        }
        
        // Función para generar respuesta de WhatsApp
        async function generateWhatsAppResponse() {
            const query = document.getElementById('searchQuery').value.trim();
            const leadName = document.getElementById('leadName').value.trim() || 'Cliente';
            
            if (!query) {
                alert('Por favor, ingresa una consulta');
                return;
            }
            
            showLoading('searchLoading');
            
            try {
                const response = await fetch('/api/faq/generate-whatsapp-response', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        query: query,
                        lead_name: leadName
                    })
                });
                
                const data = await response.json();
                displayWhatsAppResponse(data);
            } catch (error) {
                displayError('Error al generar respuesta WhatsApp: ' + error.message);
            } finally {
                hideLoading('searchLoading');
            }
        }
        
        // Función para cargar FAQs desde CSV
        async function loadFAQsFromCSV() {
            showLoading('managementLoading');
            
            try {
                const response = await fetch('/api/faq/load-csv', {
                    method: 'POST'
                });
                
                const data = await response.json();
                displayManagementResult(data, 'success');
                loadStats();
            } catch (error) {
                displayManagementResult({ error: error.message }, 'error');
            } finally {
                hideLoading('managementLoading');
            }
        }
        
        // Función para cargar todas las FAQs
        async function loadAllFAQs() {
            showLoading('managementLoading');
            
            try {
                const response = await fetch('/api/faq/all');
                const data = await response.json();
                displayAllFAQs(data);
                loadStats();
            } catch (error) {
                displayError('Error al cargar FAQs: ' + error.message);
            } finally {
                hideLoading('managementLoading');
            }
        }
        
        // Función para cargar estadísticas
        async function loadStats() {
            try {
                const response = await fetch('/api/faq/all');
                const data = await response.json();
                
                document.getElementById('totalFAQs').textContent = data.total || 0;
                document.getElementById('lastUpdate').textContent = new Date().toLocaleDateString('es-ES');
                document.getElementById('statsContainer').style.display = 'grid';
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        // Funciones de utilidad
        function showLoading(elementId) {
            document.getElementById(elementId).classList.add('show');
        }
        
        function hideLoading(elementId) {
            document.getElementById(elementId).classList.remove('show');
        }
        
        function displaySearchResults(data) {
            const container = document.getElementById('searchResults');
            
            if (data.found) {
                container.innerHTML = `
                    <div class="result-container">
                        <div class="alert alert-success">
                            ✅ Respuesta encontrada con alta confianza
                        </div>
                        <div class="result-item">
                            <h4>Pregunta: ${data.question}</h4>
                            <p>${data.message}</p>
                        </div>
                        ${data.results && data.results.length > 1 ? `
                            <h4>Otras respuestas relacionadas:</h4>
                            ${data.results.slice(1).map(faq => `
                                <div class="result-item">
                                    <h4>${faq.pregunta}</h4>
                                    <p>${faq.respuesta}</p>
                                </div>
                            `).join('')}
                        ` : ''}
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="result-container">
                        <div class="alert alert-error">
                            ❌ No se encontró información específica
                        </div>
                        <p>${data.message}</p>
                    </div>
                `;
            }
        }
        
        function displayWhatsAppResponse(data) {
            const container = document.getElementById('searchResults');
            
            container.innerHTML = `
                <div class="result-container">
                    <div class="alert ${data.found ? 'alert-success' : 'alert-error'}">
                        ${data.found ? '✅ Respuesta WhatsApp generada' : '⚠️ Respuesta genérica generada'}
                        (Confianza: ${data.confidence})
                    </div>
                    <div class="whatsapp-preview">
                        <h4>📱 Vista previa WhatsApp:</h4>
                        <div class="whatsapp-message">${data.whatsapp_message}</div>
                    </div>
                    ${data.original_question ? `
                        <div class="result-item">
                            <h4>Pregunta original encontrada:</h4>
                            <p>${data.original_question}</p>
                        </div>
                    ` : ''}
                </div>
            `;
        }
        
        function displayManagementResult(data, type) {
            const container = document.getElementById('managementResults');
            
            if (type === 'success') {
                container.innerHTML = `
                    <div class="alert alert-success">
                        ✅ ${data.message || 'Operación completada exitosamente'}
                        ${data.count ? ` (${data.count} FAQs cargadas)` : ''}
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="alert alert-error">
                        ❌ Error: ${data.error}
                    </div>
                `;
            }
        }
        
        function displayAllFAQs(data) {
            const container = document.getElementById('managementResults');
            
            container.innerHTML = `
                <div class="result-container">
                    <h4>📋 Todas las FAQs (${data.total})</h4>
                    ${data.faqs.map(faq => `
                        <div class="result-item">
                            <h4>${faq.id_pregunta}: ${faq.pregunta}</h4>
                            <p>${faq.respuesta}</p>
                            <small><strong>Palabras clave:</strong> ${faq.palabras_clave.join(', ')}</small>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function displayError(message) {
            const container = document.getElementById('searchResults');
            container.innerHTML = `
                <div class="alert alert-error">
                    ❌ ${message}
                </div>
            `;
        }
        
        // Cargar estadísticas al cargar la página
        window.addEventListener('load', loadStats);
        
        // Permitir búsqueda con Enter
        document.getElementById('searchQuery').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                searchFAQ();
            }
        });
    </script>
</body>
</html>
